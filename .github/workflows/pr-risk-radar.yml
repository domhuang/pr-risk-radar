name: PR Risk Radar

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./
        with:
          comment: "true"
          github-token: ${{ github.token }}
          fail-on: none
